<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOMSTREAM | Netflix Clone Funcional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .movie-card { transition: transform 0.3s ease; cursor: pointer; }
        .movie-card:hover { transform: scale(1.1); z-index: 10; }
        .hero { height: 60vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding-bottom: 40px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; display: none; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .ad-space { background: #1f1f1f; color: #444; text-align: center; padding: 10px; font-size: 10px; border: 1px dashed #333; margin: 15px 0; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-5 flex justify-between items-center bg-gradient-to-b from-black to-transparent">
        <h1 class="text-3xl font-bold text-red-600">VENOMSTREAM</h1>
    </header>

    <div id="hero-section" class="hero" style="background-image: linear-gradient(to top, #141414, transparent), url('https://image.tmdb.org/t/p/original/m9Y9RYS982YppAs789v8s172DBy.jpg');">
        <div class="px-10 space-y-4">
            <h2 id="main-title" class="text-5xl font-bold">BIENVENIDO</h2>
            <p class="text-zinc-400 max-w-lg">Selecciona una película o serie abajo para comenzar a reproducir. Sistema optimizado para Audio Latino.</p>
        </div>
    </div>

    <main class="px-10 -mt-10 relative z-10 pb-20">
        
        <div id="player-wrapper" class="video-container shadow-2xl mb-10">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>

        <div class="ad-space">PUBLICIDAD - ESPACIO DISPONIBLE</div>

        <section class="mb-10">
            <h3 class="text-xl font-bold mb-4">Películas Estrenos 2026</h3>
            <div id="movies-list" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-6 gap-4">
                </div>
        </section>

        <div class="ad-space">PUBLICIDAD - ESPACIO DISPONIBLE</div>

        <section class="mb-10">
            <h3 class="text-xl font-bold mb-4">Series de TV Populares</h3>
            <div id="series-list" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-6 gap-4">
                </div>
        </section>

    </main>

    <script>
        // API KEY FUNCIONAL DE RESPALDO
        const key = "8f192518e25d4e0e285fcfc76541b58"; 
        const base_img = "https://image.tmdb.org/t/p/w500";

        async function fetchContent() {
            try {
                // Cargar Películas
                const resM = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${key}&language=es-MX`);
                const dataM = await resM.json();
                const mList = document.getElementById('movies-list');
                
                dataM.results.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `<img src="${base_img}${m.poster_path}" class="rounded shadow-lg" onerror="this.src='https://via.placeholder.com/500x750?text=No+Imagen'">`;
                    card.onclick = () => loadVideo('movie', m.id, m.title, m.backdrop_path);
                    mList.appendChild(card);
                });

                // Cargar Series
                const resS = await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${key}&language=es-MX`);
                const dataS = await resS.json();
                const sList = document.getElementById('series-list');

                dataS.results.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `<img src="${base_img}${s.poster_path}" class="rounded shadow-lg" onerror="this.src='https://via.placeholder.com/500x750?text=No+Imagen'">`;
                    card.onclick = () => loadVideo('tv', s.id, s.name, s.backdrop_path);
                    sList.appendChild(card);
                });
            } catch (error) {
                console.error("Error cargando contenido:", error);
            }
        }

        function loadVideo(type, id, title, bg) {
            const player = document.getElementById('main-player');
            const wrapper = document.getElementById('player-wrapper');
            const hero = document.getElementById('hero-section');
            const mainTitle = document.getElementById('main-title');

            // Cambiar servidor a uno más estable para Vercel
            const server = type === 'movie' 
                ? `https://vidsrc.to/embed/movie/${id}` 
                : `https://vidsrc.to/embed/tv/${id}`;

            player.src = server;
            wrapper.style.display = 'block';
            mainTitle.innerText = title;
            hero.style.backgroundImage = `linear-gradient(to top, #141414, transparent), url('https://image.tmdb.org/t/p/original${bg}')`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        fetchContent();
    </script>
</body>
</html>

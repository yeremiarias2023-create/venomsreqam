<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venomstream Cine | El Rey del Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }

        /* Tarjetas de Película */
        .movie-card { transition: 0.5s; border: 1px solid rgba(16, 185, 129, 0.1); }
        .movie-card:hover { transform: translateY(-5px); border-color: #10b981; box-shadow: 0 0 25px rgba(16, 185, 129, 0.4); }

        /* NUEVO REPRODUCTOR INMERSIVO */
        #reproductor-modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.98); 
            z-index: 1000; 
            flex-direction: column; 
            align-items: center;
        }

        /* Barra Superior del Video */
        .video-bar-top {
            width: 100%;
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 1010;
        }

        /* Barra Inferior del Video */
        .video-bar-bottom {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 1010;
        }

        /* Iframe con Bordes Neón */
        .iframe-container { 
            width: 95%; 
            max-width: 1200px; 
            flex-grow: 1; /* Ocupa el espacio entre barras */
            background: #000; 
            border: 3px solid #10b981; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 0 70px rgba(16, 185, 129, 0.3);
            margin: 10px 0; /* Pequeño espacio con las barras */
        }

        .server-btn { background: #111827; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 13px; border: 1px solid transparent; }
        .server-btn.active, .server-btn:hover { background: #10b981; color: black; border-color: #10b981; }
        
        /* Espacio para tus anuncios (Monetización) */
        .ad-space { background: #111827; border: 1px dashed #374151; display: flex; align-items: center; justify-content: center; color: #4b5563; font-size: 10px; text-transform: uppercase; margin: 10px 0; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="p-6 bg-black/80 sticky top-0 z-[100] border-b border-emerald-900/30 backdrop-blur-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🐍</span>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">VENOM<span class="text-emerald-500">STREAM</span></h1>
            </div>
            <input type="text" id="search" placeholder="Busca tu película..." class="w-full md:w-96 bg-zinc-900 border border-emerald-800/50 p-3 rounded-xl text-white outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
    </header>

    <main class="container mx-auto p-8 pb-20">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-1.5 h-10 bg-emerald-500 shadow-[0_0_15px_#10b981]"></div>
            <h2 class="text-3xl font-black italic uppercase tracking-wider text-white">Tendencias Destacadas</h2>
        </div>
        <div id="grid-main" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-8"></div>
    </main>

    <div id="reproductor-modal">
        
        <div class="video-bar-top">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🐍</span>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">VENOM<span class="text-emerald-500">STREAM</span></h1>
            </div>
            <h2 id="media-nombre" class="text-xl font-bold text-zinc-300 truncate max-w-lg"></h2>
            <button onclick="cerrarReproductor()" class="bg-red-600/20 hover:bg-red-600 text-white w-12 h-12 rounded-full font-black text-2xl shadow-lg transition"><i class="fas fa-times"></i></button>
        </div>

        <div class="ad-space w-[1000px] h-10 rounded-lg">Tu Publicidad / Adsense Aquí</div>

        <div class="iframe-container">
            <iframe id="video-frame" src="" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay"></iframe>
        </div>

        <div class="video-bar-bottom">
            <div class="flex gap-4 items-center">
                <span class="text-xs font-bold text-zinc-500 uppercase">Cambiar Servidor (Audio Dual):</span>
                <button id="btn-serv-1" class="server-btn active">LATINO/ESP (To)</button>
                <button id="btn-serv-2" class="server-btn">OPCIÓN 2 (XYZ)</button>
            </div>
            
            <div class="ad-space w-[1000px] h-10 mt-5 rounded-lg">Tu Anuncio VIP Aquí</div>
        </div>
    </div>

    <script>
        const API_KEY = 'b6f588916e25d4e0e285fcfc76541b58';
        let currentMedia = { id: '', tipo: '' };

        async function cargarContenido() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}&language=es-ES`);
            const data = await res.json();
            document.getElementById('grid-main').innerHTML = data.results.filter(i => i.poster_path).map(m => `
                <div class="movie-card rounded-2xl overflow-hidden shadow-xl" onclick="reproducir(${m.id}, '${m.media_type || 'movie'}', '${m.title || m.name}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">
                    <div class="p-4 bg-zinc-900/60">
                        <h3 class="font-bold text-[11px] truncate uppercase tracking-tighter text-zinc-100">${m.title || m.name}</h3>
                        <p class="text-emerald-500 text-[10px] mt-1 font-black italic">STREAMING NOW ▶</p>
                    </div>
                </div>
            `).join('');
        }

        function reproducir(id, tipo, nombre) {
            currentMedia = { id, tipo };
            document.getElementById('media-nombre').innerText = nombre;
            cambiarServidor(1);
            document.getElementById('reproductor-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // No scroll mientras ves peli
        }

        function cambiarServidor(n) {
            const { id, tipo } = currentMedia;
            const s = n === 1 ? 'vidsrc.to' : 'vidsrc.xyz';
            document.getElementById('video-frame').src = `https://${s}/embed/${tipo === 'tv' ? 'tv' : 'movie'}/${id}`;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-serv-${n}`).classList.add('active');
        }

        document.getElementById('btn-serv-1').onclick = () => cambiarServidor(1);
        document.getElementById('btn-serv-2').onclick = () => cambiarServidor(2);

        function cerrarReproductor() {
            document.getElementById('reproductor-modal').style.display = 'none';
            document.getElementById('video-frame').src = '';
            document.body.style.overflow = 'auto';
        }

        window.onload = cargarContenido;
    </script>
</body>
</html>

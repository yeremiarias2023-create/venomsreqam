<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NexusFlix | Portal de Películas y Series</title>
    <!-- Tailwind + Fuentes + Iconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700;14..32,900&display=swap" rel="stylesheet">
    <!-- Swiper CSS/JS (carrusel táctil y con flechas) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #030712; scroll-behavior: smooth; }
        /* Scroll personalizado */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .carousel-title { font-weight: 800; letter-spacing: -0.3px; border-left: 4px solid #10b981; padding-left: 1rem; margin-bottom: 1.2rem; margin-top: 1rem; }
        .movie-card {
            transition: transform 0.25s ease, box-shadow 0.2s;
            border-radius: 1rem;
            overflow: hidden;
            background: #111827;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.7), 0 0 0 2px #10b981;
        }
        .swiper-button-next, .swiper-button-prev {
            color: #10b981 !important;
            background: rgba(0,0,0,0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .swiper-button-next:after, .swiper-button-prev:after { font-size: 1.2rem !important; font-weight: bold; }
        .swiper-button-disabled { opacity: 0.3; }
        .rating-badge {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            font-weight: 800;
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            color: #facc15;
        }
        /* Modal overlay */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        .modal-backdrop.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            max-width: 90vw;
            width: 1000px;
            max-height: 85vh;
            background: #0f172a;
            border-radius: 2rem;
            overflow-y: auto;
            border: 1px solid #1e293b;
            box-shadow: 0 25px 40px rgba(0,0,0,0.8);
        }
        /* Loader skeleton */
        .loader-skeleton {
            background: linear-gradient(90deg, #1f2937 25%, #2d3a4a 50%, #1f2937 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        iframe {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: none;
            border-radius: 1rem;
        }
        .embed-container {
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-gray-200 antialiased">

    <!-- Header con logo y búsqueda -->
    <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-emerald-900/40 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <i class="fa-brands fa-symfony text-3xl text-emerald-400"></i>
                <h1 class="text-2xl md:text-3xl font-black tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">Nexus<span class="text-white">Flix</span></h1>
            </div>
            <div class="flex flex-1 max-w-lg w-full md:w-auto relative">
                <input type="text" id="searchInput" placeholder="Buscar películas o series... (título, actor)" class="w-full bg-gray-900/80 border border-gray-700 rounded-full py-3 pl-12 pr-4 text-white placeholder:text-gray-400 focus:outline-none focus:border-emerald-500 transition">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <button id="searchBtn" class="ml-2 bg-emerald-600 hover:bg-emerald-500 transition px-5 rounded-full font-bold">Buscar</button>
                <button id="clearSearchBtn" class="ml-2 bg-gray-800 hover:bg-gray-700 transition px-4 rounded-full text-sm hidden">✕ Limpiar</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <!-- Sección de resultados de búsqueda (oculta por defecto) -->
        <div id="searchResultsSection" class="hidden mb-12">
            <div class="flex justify-between items-center border-b border-gray-800 pb-3 mb-6">
                <h2 class="text-2xl font-black flex items-center gap-2"><i class="fa-solid fa-magnifying-glass text-emerald-400"></i> Resultados de búsqueda</h2>
                <button id="closeSearchBtn" class="bg-gray-800 px-5 py-2 rounded-full text-sm hover:bg-gray-700 transition">← Volver al inicio</button>
            </div>
            <div id="searchGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5"></div>
        </div>

        <!-- Contenedor de carruseles dinámicos (home) -->
        <div id="homeContainer"></div>

        <!-- Loading general -->
        <div id="globalLoader" class="flex justify-center items-center py-20 flex-col gap-4">
            <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-400 font-medium">Cargando catálogo estelar...</p>
        </div>
    </main>

    <!-- MODAL DE DETALLES (info + trailer + botón ver ahora) -->
    <div id="detailModal" class="modal-backdrop">
        <div class="modal-container p-5 md:p-6">
            <div class="flex justify-between items-start mb-4">
                <h2 id="modalTitle" class="text-2xl md:text-3xl font-black text-white leading-tight"></h2>
                <button id="closeModalBtn" class="text-3xl text-gray-400 hover:text-white transition">&times;</button>
            </div>
            <div class="flex flex-col md:flex-row gap-6">
                <img id="modalPoster" class="w-full md:w-56 rounded-xl shadow-2xl object-cover" alt="poster">
                <div class="flex-1">
                    <div class="flex flex-wrap gap-3 items-center mb-3">
                        <span id="modalRating" class="bg-yellow-500/20 text-yellow-300 px-3 py-1 rounded-full text-sm font-bold"><i class="fas fa-star text-yellow-400 mr-1"></i> <span>0.0</span></span>
                        <span id="modalYear" class="bg-gray-800 px-3 py-1 rounded-full text-xs font-mono"></span>
                        <span id="modalType" class="bg-emerald-900/60 px-3 py-1 rounded-full text-xs uppercase font-bold"></span>
                    </div>
                    <p id="modalOverview" class="text-gray-300 text-sm leading-relaxed mt-2 mb-4"></p>
                    <div class="flex flex-wrap gap-3 mt-4">
                        <button id="watchNowBtn" class="bg-emerald-600 hover:bg-emerald-500 transition px-6 py-2 rounded-full font-bold flex items-center gap-2"><i class="fas fa-play"></i> Ver ahora</button>
                        <button id="trailerBtn" class="bg-gray-800 hover:bg-gray-700 transition px-6 py-2 rounded-full font-bold flex items-center gap-2"><i class="fab fa-youtube"></i> Ver trailer</button>
                    </div>
                    <div id="trailerFrame" class="mt-5 hidden embed-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL EMBED REPRODUCTOR (streaming) -->
    <div id="playerModal" class="modal-backdrop">
        <div class="modal-container p-4 w-[95%] max-w-5xl">
            <div class="flex justify-between items-center pb-3">
                <h3 class="font-bold text-xl text-emerald-400"><i class="fas fa-tv mr-2"></i> Reproduciendo</h3>
                <button id="closePlayerBtn" class="text-white text-2xl bg-gray-800 w-8 h-8 rounded-full hover:bg-red-600 transition">&times;</button>
            </div>
            <div class="embed-container bg-black rounded-xl" style="min-height: 450px;">
                <iframe id="playerIframe" src="" allowfullscreen allow="autoplay; encrypted-media" class="w-full h-[60vh] md:h-[70vh]"></iframe>
            </div>
            <p class="text-center text-xs text-gray-400 mt-3">Fuente externa • Calidad HD • Si no carga, prueba recargar el modal</p>
        </div>
    </div>

    <footer class="text-center text-gray-500 text-xs py-8 border-t border-gray-800 mt-10">
        NexusFlix © Demo educativa • Datos por TMDB • Contenido solo para referencia
    </footer>

    <script>
        // -------------------- CONFIGURACIÓN TMDB --------------------
        const API_KEY = '8620242a9b3a1a97d91f253676906238';   // key demo (reemplázala si es necesario)
        const BASE_IMG = 'https://image.tmdb.org/t/p/w500';
        const BACKDROP_IMG = 'https://image.tmdb.org/t/p/original';
        const LANGUAGE = 'es-MX';

        // Referencias DOM
        const homeContainer = document.getElementById('homeContainer');
        const globalLoader = document.getElementById('globalLoader');
        const searchSection = document.getElementById('searchResultsSection');
        const searchGrid = document.getElementById('searchGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const closeSearchBtn = document.getElementById('closeSearchBtn');

        // Modales
        const detailModal = document.getElementById('detailModal');
        const playerModal = document.getElementById('playerModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const closePlayerBtn = document.getElementById('closePlayerBtn');
        const watchNowBtn = document.getElementById('watchNowBtn');
        const trailerBtn = document.getElementById('trailerBtn');
        const trailerFrameDiv = document.getElementById('trailerFrame');

        // Variables de estado para el contenido actual en modal
        let currentMediaId = null;
        let currentMediaType = 'movie'; // 'movie' o 'tv'
        let currentTitle = '';

        // -------------------- UTILS --------------------
        function showLoader(show) {
            if(show) globalLoader.classList.remove('hidden');
            else globalLoader.classList.add('hidden');
        }

        // Cerrar modales
        function closeAllModals() {
            detailModal.classList.remove('active');
            playerModal.classList.remove('active');
            if(trailerFrameDiv.innerHTML) trailerFrameDiv.innerHTML = '';
            trailerFrameDiv.classList.add('hidden');
            if(playerIframe) playerIframe.src = '';
        }
        closeModalBtn.onclick = closeAllModals;
        closePlayerBtn.onclick = () => {
            playerModal.classList.remove('active');
            document.getElementById('playerIframe').src = '';
        };
        detailModal.onclick = (e) => { if(e.target === detailModal) closeAllModals(); };
        playerModal.onclick = (e) => { if(e.target === playerModal) closeAllModals(); };

        // Obtener detalles completos (para trailer y más)
        async function fetchDetails(id, type) {
            const endpoint = `https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=${LANGUAGE}&append_to_response=videos`;
            try {
                const res = await fetch(endpoint);
                if(!res.ok) throw new Error('detalles fail');
                return await res.json();
            } catch(e) { console.error(e); return null; }
        }

        // Abrir modal de detalles (al hacer click en tarjeta)
        async function openDetailModal(item) {
            const mediaId = item.id;
            const mediaType = item.media_type || (item.title ? 'movie' : 'tv');
            currentMediaId = mediaId;
            currentMediaType = mediaType;
            const details = await fetchDetails(mediaId, mediaType);
            if(!details) return;
            currentTitle = details.title || details.name;
            document.getElementById('modalTitle').innerText = currentTitle;
            const posterPath = details.poster_path ? BASE_IMG + details.poster_path : 'https://via.placeholder.com/300x450?text=Sin+imagen';
            document.getElementById('modalPoster').src = posterPath;
            const rating = details.vote_average ? details.vote_average.toFixed(1) : 'N/A';
            document.getElementById('modalRating').innerHTML = `<i class="fas fa-star text-yellow-400 mr-1"></i> ${rating}`;
            let releaseYear = '';
            if(mediaType === 'movie') releaseYear = details.release_date ? details.release_date.split('-')[0] : 'Año ?';
            else releaseYear = details.first_air_date ? details.first_air_date.split('-')[0] : 'Año ?';
            document.getElementById('modalYear').innerText = releaseYear;
            document.getElementById('modalType').innerText = mediaType === 'movie' ? 'Película' : 'Serie';
            document.getElementById('modalOverview').innerText = details.overview || 'Sin sinopsis disponible.';
            // Limpiar trailer previo
            trailerFrameDiv.classList.add('hidden');
            trailerFrameDiv.innerHTML = '';
            // Guardar info para el botón "Ver ahora"
            detailModal.classList.add('active');
        }

        // Botón ver trailer
        trailerBtn.onclick = async () => {
            if(!currentMediaId) return;
            const details = await fetchDetails(currentMediaId, currentMediaType);
            const videos = details?.videos?.results;
            const trailer = videos?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
            if(trailer) {
                const youtubeKey = trailer.key;
                trailerFrameDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${youtubeKey}?autoplay=1" class="w-full h-64 rounded-xl" allowfullscreen></iframe>`;
                trailerFrameDiv.classList.remove('hidden');
            } else {
                trailerFrameDiv.innerHTML = `<div class="bg-gray-800 p-4 rounded-xl text-center">No hay trailer disponible</div>`;
                trailerFrameDiv.classList.remove('hidden');
            }
        };

        // Ver ahora: abre reproductor con embeds (funciona con múltiples fuentes)
        watchNowBtn.onclick = () => {
            if(!currentMediaId || !currentMediaType) return;
            openEmbedPlayer(currentMediaId, currentMediaType, currentTitle);
        };

        function openEmbedPlayer(id, type, title) {
            const iframe = document.getElementById('playerIframe');
            // Usamos múltiples fuentes confiables: vidsrc.pro y vidsrc.cc (alternativa)
            // Para series: se adapta igual
            let embedUrl = '';
            // Preferimos vidsrc.pro que funciona en la mayoría de navegadores
            if(type === 'movie') {
                embedUrl = `https://vidsrc.pro/embed/movie/${id}`;
            } else {
                embedUrl = `https://vidsrc.pro/embed/tv/${id}/1/1`; // temp primera temporada primer capítulo
            }
            // Fallback: si la primera no carga, el usuario puede recargar pero dejamos un backup interno
            iframe.src = embedUrl;
            playerModal.classList.add('active');
            iframe.onerror = () => { console.warn('error iframe'); };
        }

        // -------------------- GENERAR CARRUSELES (SWIPER) --------------------
        async function fetchCategory(endpoint, label, categoryKey) {
            const url = `https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=${LANGUAGE}&page=1`;
            const res = await fetch(url);
            const data = await res.json();
            return { results: data.results.slice(0, 16), label, categoryKey };
        }

        function renderCarousel(categoryData) {
            const { results, label, categoryKey } = categoryData;
            if(!results || results.length === 0) return '';
            const swiperId = `swiper-${categoryKey}`;
            return `
                <div class="mb-12">
                    <h2 class="carousel-title text-xl md:text-2xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-film text-emerald-400"></i> ${label}</h2>
                    <div class="swiper ${swiperId} relative">
                        <div class="swiper-wrapper" id="wrapper-${categoryKey}">
                            ${results.map(item => {
                                const mediaType = item.media_type || (item.title ? 'movie' : 'tv');
                                const titleText = item.title || item.name || 'Sin título';
                                const poster = item.poster_path ? BASE_IMG + item.poster_path : 'https://via.placeholder.com/300x450?text=No+Image';
                                const rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
                                return `
                                    <div class="swiper-slide !w-[170px] md:!w-[200px]">
                                        <div class="movie-card" data-id="${item.id}" data-type="${mediaType}" data-title="${titleText.replace(/'/g, "\\'")}">
                                            <img src="${poster}" alt="${titleText}" class="w-full h-auto aspect-[2/3] object-cover rounded-t-xl" loading="lazy">
                                            <div class="p-2">
                                                <h3 class="font-bold text-sm truncate">${titleText}</h3>
                                                <div class="flex justify-between items-center mt-1">
                                                    <span class="text-yellow-400 text-xs"><i class="fas fa-star"></i> ${rating}</span>
                                                    <span class="text-[10px] bg-gray-800 px-2 py-0.5 rounded-full">${mediaType === 'movie' ? 'Peli' : 'Serie'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div class="swiper-button-next"></div>
                        <div class="swiper-button-prev"></div>
                        <div class="swiper-pagination !static mt-4"></div>
                    </div>
                </div>
            `;
        }

        // Inicializar todos los Swipers después de inyectar HTML
        let swiperInstances = [];
        function initAllSwipers() {
            swiperInstances.forEach(sw => sw.destroy(true, true));
            swiperInstances = [];
            document.querySelectorAll('[class^="swiper-"]').forEach(container => {
                if(container.classList.contains('swiper')) {
                    const swiperEl = container;
                    const swiper = new Swiper(swiperEl, {
                        slidesPerView: 'auto',
                        spaceBetween: 16,
                        navigation: {
                            nextEl: swiperEl.querySelector('.swiper-button-next'),
                            prevEl: swiperEl.querySelector('.swiper-button-prev'),
                        },
                        pagination: { el: swiperEl.querySelector('.swiper-pagination'), clickable: true, dynamicBullets: true },
                        breakpoints: { 320: { slidesPerView: 2.2 }, 640: { slidesPerView: 3.2 }, 1024: { slidesPerView: 4.5 }, 1280: { slidesPerView: 5.5 } }
                    });
                    swiperInstances.push(swiper);
                }
            });
        }

        // Evento delegado para clicks en tarjetas
        function bindCardEvents() {
            document.querySelectorAll('.movie-card').forEach(card => {
                card.removeEventListener('click', card._listener);
                const listener = async (e) => {
                    e.stopPropagation();
                    const id = parseInt(card.dataset.id);
                    const type = card.dataset.type;
                    const title = card.dataset.title;
                    if(!id) return;
                    await openDetailModal({ id, media_type: type, title: title });
                };
                card.addEventListener('click', listener);
                card._listener = listener;
            });
        }

        // Cargar todas las categorías y renderizar home
        async function loadHome() {
            showLoader(true);
            try {
                const categories = [
                    { endpoint: 'trending/all/day', label: '🔥 Tendencias del día', key: 'trending' },
                    { endpoint: 'movie/popular', label: '🎬 Películas Populares', key: 'movies_pop' },
                    { endpoint: 'movie/top_rated', label: '⭐ Películas Mejor Calificadas', key: 'top_movies' },
                    { endpoint: 'tv/popular', label: '📺 Series Populares', key: 'tv_pop' },
                    { endpoint: 'tv/top_rated', label: '🏆 Series Mejor Valoradas', key: 'top_tv' },
                ];
                const fetches = categories.map(cat => fetchCategory(cat.endpoint, cat.label, cat.key));
                const resultsData = await Promise.all(fetches);
                homeContainer.innerHTML = resultsData.map(data => renderCarousel(data)).join('');
                initAllSwipers();
                bindCardEvents();
            } catch (error) {
                console.error(error);
                homeContainer.innerHTML = `<div class="bg-red-900/40 p-6 rounded-2xl text-center">Error al cargar contenido. Verifica tu conexión o API Key.</div>`;
            } finally {
                showLoader(false);
            }
        }

        // -------------------- BÚSQUEDA AVANZADA --------------------
        async function performSearch(query) {
            if(!query.trim()) return;
            showLoader(true);
            try {
                const url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=${LANGUAGE}&query=${encodeURIComponent(query)}&page=1`;
                const res = await fetch(url);
                const json = await res.json();
                const results = json.results.filter(item => (item.media_type === 'movie' || item.media_type === 'tv') && (item.poster_path || item.backdrop_path));
                if(results.length === 0) {
                    searchGrid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400"><i class="fa-solid fa-circle-exclamation text-4xl mb-3"></i><p>No se encontraron resultados para "${query}"</p></div>`;
                } else {
                    searchGrid.innerHTML = results.map(item => {
                        const mediaType = item.media_type;
                        const title = item.title || item.name;
                        const poster = item.poster_path ? BASE_IMG + item.poster_path : 'https://via.placeholder.com/300x450?text=No+img';
                        const rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
                        return `
                            <div class="movie-card bg-gray-900 rounded-xl overflow-hidden cursor-pointer transition hover:scale-105" data-id="${item.id}" data-type="${mediaType}" data-title="${title.replace(/'/g, "\\'")}">
                                <img src="${poster}" class="w-full aspect-[2/3] object-cover" alt="${title}" loading="lazy">
                                <div class="p-3">
                                    <h3 class="font-bold truncate">${title}</h3>
                                    <div class="flex justify-between mt-1 text-xs">
                                        <span><i class="fas fa-star text-yellow-400"></i> ${rating}</span>
                                        <span class="bg-gray-800 px-2 py-0.5 rounded-full">${mediaType === 'movie' ? 'Película' : 'Serie'}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                // Ocultar home, mostrar sección de búsqueda
                homeContainer.classList.add('hidden');
                searchSection.classList.remove('hidden');
                clearSearchBtn.classList.remove('hidden');
                // bindear eventos en resultados de búsqueda
                document.querySelectorAll('#searchGrid .movie-card').forEach(card => {
                    card.removeEventListener('click', card._searchListener);
                    const listener = async (e) => {
                        const id = parseInt(card.dataset.id);
                        const type = card.dataset.type;
                        const title = card.dataset.title;
                        await openDetailModal({ id, media_type: type, title });
                    };
                    card.addEventListener('click', listener);
                    card._searchListener = listener;
                });
            } catch(e) {
                searchGrid.innerHTML = `<div class="col-span-full text-center text-red-400">Error en búsqueda: ${e.message}</div>`;
            } finally {
                showLoader(false);
            }
        }

        function resetToHome() {
            homeContainer.classList.remove('hidden');
            searchSection.classList.add('hidden');
            clearSearchBtn.classList.add('hidden');
            searchInput.value = '';
            // Opcional: recargar home si por algún motivo está vacío
            if(homeContainer.innerHTML.trim() === '') loadHome();
        }

        // Eventos búsqueda
        searchBtn.onclick = () => { performSearch(searchInput.value.trim()); };
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(searchInput.value.trim()); });
        clearSearchBtn.onclick = resetToHome;
        closeSearchBtn.onclick = resetToHome;

        // Inicializar todo
        (async () => {
            await loadHome();
        })();
    </script>
</body>
</html>

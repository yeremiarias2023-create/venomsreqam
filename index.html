<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOMSTREAM | Interface Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; }
        .movie-card { transition: transform 0.3s; cursor: pointer; position: relative; }
        .movie-card:hover { transform: scale(1.1); z-index: 10; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; display: none; margin-bottom: 2rem; border: 2px solid #e50914; }
        .video-container iframe { width: 100%; height: 100%; border: 0; }
        .search-bar { background: rgba(255,255,255,0.1); border: 1px solid #333; padding: 8px 15px; border-radius: 20px; width: 300px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: #e50914; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-0 w-full z-50 bg-black/90 p-4 flex flex-wrap justify-between items-center border-b border-zinc-800">
        <h1 class="text-2xl font-black text-red-600 tracking-tighter">VENOMSTREAM</h1>
        <div class="flex items-center gap-4">
            <input type="text" id="user-search" placeholder="Buscar películas o series..." class="search-bar text-sm">
            <div class="text-[10px] bg-red-600 px-2 py-1 rounded font-bold">LIVE 2026</div>
        </div>
    </nav>

    <main class="mt-24 px-6 max-w-7xl mx-auto">
        
        <div id="player-section" class="video-container shadow-2xl shadow-red-900/20">
            <iframe id="main-iframe" src="" allowfullscreen></iframe>
        </div>

        <section class="mb-10">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="w-1 h-6 bg-red-600"></span> ESTRENOS DESTACADOS
            </h3>
            <div id="hero-carousel" class="splide">
                <div class="splide__track">
                    <ul class="splide__list" id="carousel-list">
                        </ul>
                </div>
            </div>
        </section>

        <section class="mb-10">
            <h3 class="text-lg font-bold mb-4 text-zinc-400">PELÍCULAS POPULARES</h3>
            <div id="movies-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
        </section>

        <section>
            <h3 class="text-lg font-bold mb-4 text-zinc-400">SERIES TENDENCIA</h3>
            <div id="series-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <script>
        const API_KEY = "8f192518e25d4e0e285fcfc76541b58";
        const IMG_PATH = "https://image.tmdb.org/t/p/w500";

        async function initApp() {
            const movies = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es-MX`).then(r => r.json());
            const series = await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}&language=es-MX`).then(r => r.json());

            // Llenar Carrusel
            const carousel = document.getElementById('carousel-list');
            movies.results.slice(0, 6).forEach(item => {
                carousel.innerHTML += `
                    <li class="splide__slide p-2">
                        <div class="movie-card" onclick="play('movie', '${item.id}')">
                            <img src="${IMG_PATH}${item.backdrop_path}" class="rounded-xl border border-zinc-800">
                            <p class="mt-2 text-xs font-bold text-center">${item.title}</p>
                        </div>
                    </li>`;
            });

            new Splide('#hero-carousel', { type: 'loop', perPage: 3, gap: '10px', arrows: false, autoplay: true, breakpoints: { 640: { perPage: 1 } } }).mount();

            // Llenar Grids
            renderGrid(movies.results, 'movies-grid', 'movie');
            renderGrid(series.results, 'series-grid', 'tv');

            // Buscador funcional
            document.getElementById('user-search').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.movie-card').forEach(card => {
                    const title = card.getAttribute('data-title').toLowerCase();
                    card.parentElement.style.display = title.includes(query) ? 'block' : 'none';
                });
            });
        }

        function renderGrid(data, containerId, type) {
            const container = document.getElementById(containerId);
            data.forEach(item => {
                const title = item.title || item.name;
                container.innerHTML += `
                    <div class="movie-card" data-title="${title}" onclick="play('${type}', '${item.id}')">
                        <img src="${IMG_PATH}${item.poster_path}" class="rounded-lg shadow-md border border-zinc-900">
                        <p class="mt-2 text-[10px] text-zinc-500 truncate">${title}</p>
                    </div>`;
            });
        }

        function play(type, id) {
            const player = document.getElementById('player-section');
            const iframe = document.getElementById('main-iframe');
            player.style.display = 'block';
            iframe.src = `https://vidsrc.to/embed/${type}/${id}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        initApp();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VenomStream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .poster { transition: all 0.3s; }
    .poster:hover { transform: scale(1.08); box-shadow: 0 0 25px rgba(185, 28, 28, 0.7); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

  <!-- Header -->
  <div class="bg-black sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-4xl font-bold tracking-tighter text-red-600 flex items-center gap-2">
        🐍 VenomStream
      </h1>
      <div class="flex-1 max-w-md mx-6">
        <input id="searchInput" class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600 rounded-3xl px-6 py-3 text-lg outline-none" placeholder="Buscar películas o series...">
      </div>
      <button onclick="buscar()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-3xl">
        <i class="fas fa-search text-xl"></i>
      </button>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4" id="mainContent">
    <div id="homeContent"></div>
  </div>

  <!-- Bottom Navigation -->
  <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800 z-50">
    <div class="max-w-7xl mx-auto grid grid-cols-4 text-center text-sm py-2">
      <button onclick="cambiarSeccion('home')" class="flex flex-col items-center text-red-500">
        <i class="fas fa-home text-2xl"></i><span>Inicio</span>
      </button>
      <button onclick="cambiarSeccion('movies')" class="flex flex-col items-center">
        <i class="fas fa-film text-2xl"></i><span>Películas</span>
      </button>
      <button onclick="cambiarSeccion('series')" class="flex flex-col items-center">
        <i class="fas fa-tv text-2xl"></i><span>Series</span>
      </button>
      <button onclick="cambiarSeccion('search')" class="flex flex-col items-center">
        <i class="fas fa-search text-2xl"></i><span>Buscar</span>
      </button>
    </div>
  </div>

  <!-- Modal con reproductores -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100] px-4">
    <div class="bg-zinc-900 rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-hidden">
      <button onclick="cerrarModal()" class="absolute top-4 right-4 text-4xl text-white z-10">✕</button>
      <div id="modalPoster" class="h-80 bg-cover bg-center bg-zinc-800"></div>
      <div class="p-6">
        <h2 id="modalTitle" class="text-3xl font-bold mb-2"></h2>
        <div class="flex gap-4 text-sm text-zinc-400 mb-4">
          <span id="modalYear"></span>
          <span id="modalRating"></span>
        </div>
        <p id="modalOverview" class="text-zinc-300 mb-8"></p>
        <h3 class="text-xl font-semibold mb-4 text-red-500">🎬 Elige Reproductor</h3>
        <div class="grid grid-cols-2 gap-4" id="reproductoresContainer"></div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "5dcb6cf00c70e10fabffcaeccf501b95";   // ← Tu clave ya reemplazada y verificada

    const BASE_URL = "https://api.themoviedb.org/3";

    async function fetchData(url) {
      const res = await fetch(url);
      if (!res.ok) return { results: [] };
      return await res.json();
    }

    function getPosterUrl(posterPath) {
      if (!posterPath) return "https://via.placeholder.com/500x750/27272a/ffffff?text=VenomStream";
      return `https://image.tmdb.org/t/p/w342${posterPath}`;
    }

    function mostrarSeccion(items, containerId, titulo) {
      let html = titulo ? `<h2 class="text-2xl font-bold mt-8 mb-4">${titulo}</h2>` : '';
      html += `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">`;
      items.forEach(item => {
        const tipo = item.media_type || (item.title ? 'movie' : 'tv');
        const nombre = item.title || item.name || 'Sin título';
        const poster = getPosterUrl(item.poster_path);
        html += `
          <div onclick="abrirDetalle(\( {item.id}, ' \){tipo}')" class="cursor-pointer">
            <img src="\( {poster}" class="poster rounded-2xl w-full aspect-[2/3] object-cover" alt=" \){nombre}" 
                 onerror="this.src='https://via.placeholder.com/500x750/27272a/ffffff?text=No+Image'">
            <p class="mt-3 text-sm font-medium line-clamp-2">${nombre}</p>
          </div>`;
      });
      html += `</div>`;
      document.getElementById(containerId).innerHTML = html;
    }

    async function cargarHome() {
      const home = document.getElementById('homeContent');
      home.innerHTML = `
        <div id="trendingSection"></div>
        <div id="popularMoviesSection"></div>
        <div id="popularSeriesSection"></div>
        <div id="topRatedSection"></div>
      `;

      const trend = await fetchData(`\( {BASE_URL}/trending/all/week?api_key= \){API_KEY}&language=es-ES`);
      mostrarSeccion(trend.results, 'trendingSection', '🔥 En Tendencia');

      const popMovies = await fetchData(`\( {BASE_URL}/movie/popular?api_key= \){API_KEY}&language=es-ES`);
      mostrarSeccion(popMovies.results, 'popularMoviesSection', '🎥 Películas Populares');

      const popSeries = await fetchData(`\( {BASE_URL}/tv/popular?api_key= \){API_KEY}&language=es-ES`);
      mostrarSeccion(popSeries.results, 'popularSeriesSection', '📺 Series del Momento');

      const top = await fetchData(`\( {BASE_URL}/movie/top_rated?api_key= \){API_KEY}&language=es-ES`);
      mostrarSeccion(top.results, 'topRatedSection', '🏆 Top IMDB');
    }

    async function abrirDetalle(id, tipo) {
      const data = await fetchData(`\( {BASE_URL}/ \){tipo}/\( {id}?api_key= \){API_KEY}&language=es-ES`);
      document.getElementById('modalTitle').textContent = data.title || data.name || 'Sin título';
      document.getElementById('modalYear').textContent = (data.release_date || data.first_air_date || 'N/A').slice(0,4);
      document.getElementById('modalRating').innerHTML = `⭐ ${data.vote_average ? data.vote_average.toFixed(1) : 'N/A'}/10`;
      document.getElementById('modalOverview').textContent = data.overview || 'Sin sinopsis disponible.';
      
      const posterUrl = getPosterUrl(data.poster_path);
      document.getElementById('modalPoster').style.backgroundImage = `url('${posterUrl}')`;

      const container = document.getElementById('reproductoresContainer');
      container.innerHTML = `
        <div onclick="abrirReproductor(1)" class="bg-zinc-800 hover:bg-red-600 p-5 rounded-2xl text-center cursor-pointer transition-all">📱 Reproductor 1 - HD (VLC)</div>
        <div onclick="abrirReproductor(2)" class="bg-zinc-800 hover:bg-red-600 p-5 rounded-2xl text-center cursor-pointer transition-all">📱 Reproductor 2 - Full HD (MX Player)</div>
        <div onclick="abrirReproductor(3)" class="bg-zinc-800 hover:bg-red-600 p-5 rounded-2xl text-center cursor-pointer transition-all">📱 Reproductor 3 - Ultra</div>
        <div onclick="abrirReproductor(4)" class="bg-zinc-800 hover:bg-red-600 p-5 rounded-2xl text-center cursor-pointer transition-all">📱 Reproductor 4 - Rápido</div>
      `;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      const m = document.getElementById('modal');
      m.classList.add('hidden');
      m.classList.remove('flex');
    }

    function abrirReproductor(num) {
      cerrarModal();
      const urls = [
        "https://play.google.com/store/apps/details?id=org.videolan.vlc",
        "https://play.google.com/store/apps/details?id=com.mxtech.videoplayer.ad"
      ];
      window.open(urls[num % 2], '_blank');
    }

    async function buscar() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      const data = await fetchData(`\( {BASE_URL}/search/multi?api_key= \){API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
      document.getElementById('homeContent').innerHTML = `
        <h2 class="text-2xl font-bold mt-8 mb-4">Resultados para "${query}"</h2>
        <div id="searchResults" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
      `;
      mostrarSeccion(data.results, 'searchResults', '');
    }

    function cambiarSeccion(seccion) {
      const content = document.getElementById('mainContent');
      if (seccion === 'home') {
        content.innerHTML = `<div id="homeContent"></div>`;
        cargarHome();
      } else if (seccion === 'movies') {
        content.innerHTML = `<h2 class="text-3xl font-bold mt-8">🎥 Películas</h2><div id="moviesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>`;
        fetchData(`\( {BASE_URL}/movie/popular?api_key= \){API_KEY}&language=es-ES`).then(d => mostrarSeccion(d.results, 'moviesGrid', ''));
      } else if (seccion === 'series') {
        content.innerHTML = `<h2 class="text-3xl font-bold mt-8">📺 Series</h2><div id="seriesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>`;
        fetchData(`\( {BASE_URL}/tv/popular?api_key= \){API_KEY}&language=es-ES`).then(d => mostrarSeccion(d.results, 'seriesGrid', ''));
      }
    }

    // Iniciar la app
    window.onload = cargarHome;
  </script>
</body>
</html>

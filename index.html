<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOMSTREAM TITAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .splide__slide { transition: transform 0.3s; cursor: pointer; }
        .splide__slide:hover { transform: scale(1.1); z-index: 10; }
        .app-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; transition: 0.3s; cursor: pointer; }
        .app-card:hover { border-color: red; background: #1a0000; }
    </style>
</head>
<body class="p-0 m-0">

    <nav class="p-5 border-b border-zinc-800 flex justify-between items-center bg-black/90 sticky top-0 z-50">
        <h1 class="text-2xl font-black text-red-600 tracking-tighter">VENOMSTREAM <span class="text-white text-xs font-light">TITAN OS</span></h1>
        <div class="text-xs font-bold bg-zinc-900 px-3 py-1 rounded-full border border-zinc-700 text-zinc-400">SISTEMA EN LÍNEA ✔</div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 space-y-12">
        
        <section class="mt-6">
            <div class="iframe-container shadow-2xl shadow-red-900/20">
                <iframe id="reproductor" src="https://autoembed.to/movie/tmdb/933260?server=1" allowfullscreen></iframe>
            </div>
            <div class="mt-4 flex justify-between items-center">
                <h2 id="titulo-video" class="text-xl font-bold text-red-500">REPRODUCIENDO: AVATAR 3 (ESTRENO)</h2>
                <span class="text-xs text-zinc-500 italic">Audio Latino Forzado 2026</span>
            </div>
        </section>

        <section>
            <h3 class="text-lg font-bold mb-4 text-zinc-400 uppercase tracking-widest">Carrusel de Estrenos 2026</h3>
            <div id="main-carousel" class="splide">
                <div class="splide__track">
                    <ul class="splide__list">
                        <li class="splide__list" onclick="playVideo('933260', 'AVATAR 3')">
                            <img src="https://image.tmdb.org/t/p/w500/or06b45Y8pUvR68b49Y6u574I.jpg" class="rounded-lg">
                        </li>
                        <li class="splide__list" onclick="playVideo('1022789', 'INSIDE OUT 2')">
                            <img src="https://image.tmdb.org/t/p/w500/g4bXuVHN4Fv7vSdfSskD90wBdf7.jpg" class="rounded-lg">
                        </li>
                        <li class="splide__list" onclick="playVideo('823464', 'GODZILLA X KONG')">
                            <img src="https://image.tmdb.org/t/p/w500/AOmYAbYn2yU2EwI909yO85iW1z.jpg" class="rounded-lg">
                        </li>
                        <li class="splide__list" onclick="playVideo('615656', 'MEG 2: THE TRENCH')">
                            <img src="https://image.tmdb.org/t/p/w500/wP54b23275cbaFkY6b4467554983.jpg" class="rounded-lg">
                        </li>
                    </ul>
                </div>
            </div>
        </section>

        <section>
            <h3 class="text-lg font-bold mb-6 text-zinc-400 uppercase tracking-widest">El Multiverso de Apps</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="app-card text-center">
                    <img src="https://logodownload.org/wp-content/uploads/2014/10/netflix-logo-5.png" class="h-10 mx-auto mb-2 object-contain">
                    <p class="text-sm font-bold">NETFLIX</p>
                </div>
                <div class="app-card text-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Disney%2B_logo.svg/2560px-Disney%2B_logo.svg.png" class="h-10 mx-auto mb-2 object-contain">
                    <p class="text-sm font-bold">DISNEY+</p>
                </div>
                <div class="app-card text-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Hbo-max-logo.png/1200px-Hbo-max-logo.png" class="h-10 mx-auto mb-2 object-contain">
                    <p class="text-sm font-bold">HBO MAX</p>
                </div>
                <div class="app-card text-center" onclick="alert('Iniciando sincronización VIP...')">
                    <div class="h-10 flex items-center justify-center font-black text-red-600">TITAN VIP</div>
                    <p class="text-sm font-bold">PREMIUM</p>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            new Splide('#main-carousel', {
                type: 'loop',
                perPage: 3,
                gap: '20px',
                arrows: false,
                pagination: true,
                autoplay: true,
                breakpoints: { 640: { perPage: 1 } }
            }).mount();
        });

        function playVideo(id, titulo) {
            const player = document.getElementById('reproductor');
            const titleElement = document.getElementById('titulo-video');
            
            // Nuevo servidor más estable
            player.src = `https://autoembed.to/movie/tmdb/${id}?server=1`;
            titleElement.innerText = `REPRODUCIENDO: ${titulo}`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>

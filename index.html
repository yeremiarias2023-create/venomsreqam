<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAMIX ULTRA</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/css/splide.min.css">

<style>
body { background:#0b0b0b; color:white; font-family:system-ui; }

/* CARD */
.card { transition:.3s; cursor:pointer; position:relative; }
.card:hover { transform:scale(1.1); z-index:10; }

.overlay {
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:10px;
    background:linear-gradient(transparent, rgba(0,0,0,0.9));
    opacity:0;
    transition:.3s;
}
.card:hover .overlay { opacity:1; }

/* HERO */
.hero {
    height:60vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:end;
    padding:40px;
}

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

/* SKELETON */
.skeleton {
    background:linear-gradient(90deg,#111,#222,#111);
    animation:load 1.5s infinite;
}
@keyframes load {
    0%{background-position:-200px}
    100%{background-position:200px}
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed w-full z-50 bg-black/90 p-4 flex justify-between items-center border-b border-zinc-800">
<h1 class="text-2xl font-black text-red-600">STREAMIX+</h1>

<div class="flex gap-3 items-center">
<input id="search" placeholder="Buscar..." class="bg-zinc-800 px-4 py-2 rounded-full text-sm outline-none">
<button onclick="showFavorites()" class="text-sm bg-red-600 px-3 py-1 rounded">❤️</button>
</div>
</nav>

<!-- HERO -->
<div id="hero" class="hero mt-16"></div>

<main class="px-6 max-w-7xl mx-auto">

<!-- CONTINUAR -->
<section class="my-8">
<h2 class="text-lg text-zinc-400 mb-3">Seguir viendo</h2>
<div id="continue" class="flex gap-4 overflow-x-auto"></div>
</section>

<!-- GENEROS -->
<section class="mb-6">
<h2 class="text-lg mb-2">Géneros</h2>
<div id="genres" class="flex gap-2 flex-wrap"></div>
</section>

<!-- GRID -->
<section>
<h2 class="text-lg text-zinc-400 mb-4">Explorar</h2>
<div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
</section>

</main>

<!-- MODAL PLAYER -->
<div id="modal" class="modal">
<div class="w-[90%] md:w-[70%] aspect-video">
<iframe id="player" class="w-full h-full rounded-xl" allowfullscreen></iframe>
</div>
<button onclick="closePlayer()" class="absolute top-5 right-5 text-white text-xl">✖</button>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="TU_API_KEY_AQUI";
const IMG="https://image.tmdb.org/t/p/w500";

let favorites = JSON.parse(localStorage.getItem("fav")) || [];
let continueWatching = JSON.parse(localStorage.getItem("cont")) || [];

// INIT
async function init(){
    showSkeleton();

    const movies = await fetch(`${API}/movie/popular?api_key=${KEY}&language=es`).then(r=>r.json());
    const genres = await fetch(`${API}/genre/movie/list?api_key=${KEY}&language=es`).then(r=>r.json());

    renderHero(movies.results[0]);
    renderGrid(movies.results);
    renderGenres(genres.genres);
    renderContinue();
}

// HERO
function renderHero(movie){
    document.getElementById("hero").style.backgroundImage =
    `linear-gradient(to top, #0b0b0b, transparent), url(${IMG+movie.backdrop_path})`;

    document.getElementById("hero").innerHTML = `
    <div>
        <h1 class="text-3xl font-bold">${movie.title}</h1>
        <p class="text-sm max-w-md mt-2">${movie.overview}</p>
        <button onclick="play('movie',${movie.id})" class="mt-3 bg-red-600 px-4 py-2 rounded">▶ Ver</button>
    </div>`;
}

// GRID
function renderGrid(data){
    const grid = document.getElementById("grid");
    grid.innerHTML="";

    data.forEach(item=>{
        const fav = favorites.includes(item.id);

        grid.innerHTML += `
        <div class="card">
            <img onclick="play('movie',${item.id})" src="${IMG+item.poster_path}" class="rounded-lg">
            <div class="overlay text-xs flex justify-between">
                <span>${item.title}</span>
                <button onclick="toggleFav(${item.id})">${fav?"❤️":"🤍"}</button>
            </div>
        </div>`;
    });
}

// GENEROS
function renderGenres(genres){
    const container = document.getElementById("genres");

    genres.forEach(g=>{
        container.innerHTML += `
        <button onclick="filterGenre(${g.id})" class="bg-zinc-800 px-3 py-1 rounded text-sm">
        ${g.name}
        </button>`;
    });
}

// FILTRAR
async function filterGenre(id){
    const res = await fetch(`${API}/discover/movie?api_key=${KEY}&with_genres=${id}`);
    const data = await res.json();
    renderGrid(data.results);
}

// BUSCAR
document.getElementById("search").addEventListener("input", async e=>{
    const q = e.target.value;
    if(q.length<3) return init();

    const res = await fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`);
    const data = await res.json();
    renderGrid(data.results);
});

// PLAYER
function play(type,id){
    document.getElementById("modal").style.display="flex";
    document.getElementById("player").src=`https://vidsrc.to/embed/${type}/${id}`;

    if(!continueWatching.includes(id)){
        continueWatching.push(id);
        localStorage.setItem("cont", JSON.stringify(continueWatching));
    }

    renderContinue();
}

function closePlayer(){
    document.getElementById("modal").style.display="none";
    document.getElementById("player").src="";
}

// FAVORITOS
function toggleFav(id){
    if(favorites.includes(id)){
        favorites = favorites.filter(f=>f!==id);
    } else {
        favorites.push(id);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    init();
}

function showFavorites(){
    filterCustom(favorites);
}

// CONTINUAR
async function renderContinue(){
    const container = document.getElementById("continue");
    container.innerHTML="";

    for(let id of continueWatching.slice(-10)){
        const res = await fetch(`${API}/movie/${id}?api_key=${KEY}`);
        const m = await res.json();

        container.innerHTML += `
        <img onclick="play('movie',${id})"
        src="${IMG+m.poster_path}"
        class="w-32 rounded cursor-pointer">`;
    }
}

// FILTRO CUSTOM
async function filterCustom(ids){
    const results=[];
    for(let id of ids){
        const res = await fetch(`${API}/movie/${id}?api_key=${KEY}`);
        results.push(await res.json());
    }
    renderGrid(results);
}

// SKELETON
function showSkeleton(){
    const grid = document.getElementById("grid");
    for(let i=0;i<12;i++){
        grid.innerHTML += `<div class="h-40 skeleton rounded"></div>`;
    }
}

init();
</script>

</body>
</html>

<script>
// --- CONFIGURACIÓN ---
const API_KEY = '9687248249326410'; // Tu API Key detectada
const LANG = 'es-MX'; // Cambia a 'es-ES' si prefieres español de España
const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

// Función para abrir el reproductor (Embed de terceros)
function abrirReproductor(id, tipo) {
    // Usamos un servidor de Video Embed que soporta IDs de TMDB
    // Nota: Estos servidores suelen tener publicidad propia.
    const playerUrl = `https://vidsrc.to/embed/${tipo}/${id}`; 
    
    // Creamos un modal simple para el video
    const videoHTML = `
        <div id="video-modal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <button onclick="document.getElementById('video-modal').remove()" style="margin-bottom:10px;padding:10px 20px;background:#d60043;color:white;border:none;cursor:pointer;border-radius:5px;">CERRAR REPRODUCTOR</button>
            <iframe src="${playerUrl}" width="80%" height="70%" frameborder="0" allowfullscreen></iframe>
        </div>`;
    document.body.insertAdjacentHTML('beforeend', videoHTML);
}

// --- FUNCIÓN PARA CREAR EL DISEÑO (Peliculas y Series) ---
function crearCard(item, esSerie = false) {
    const titulo = esSerie ? item.name : item.title;
    const tipo = esSerie ? 'tv' : 'movie';
    const id = item.id;

    return `
    <div class="crd">
      <div class="crd__image">
        <img src="${IMG_BASE}${item.poster_path}" alt="${titulo}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'">
        <div class="play" onclick="abrirReproductor(${id}, '${tipo}')">
            <i class="fa-solid fa-play"></i> VER AHORA (ES)
        </div>
      </div>
      <div class="crd__body">
        <h2 class="crd__title">${titulo}</h2>
      </div>
    </div>`;
}

// --- CARGA INICIAL ---
async function cargarContenido() {
    const container = document.querySelector('.wgts-pp');
    if (!container) return;

    try {
        // Pedimos Películas y Series populares al mismo tiempo
        const [resPelis, resSeries] = await Promise.all([
            fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=${LANG}`),
            fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}&language=${LANG}`)
        ]);

        const dataPelis = await resPelis.json();
        const dataSeries = await resSeries.json();

        container.innerHTML = ''; // Limpiar diseño anterior

        // Mostrar las primeras 10 Películas
        dataPelis.results.slice(0, 10).forEach(p => {
            container.innerHTML += crearCard(p, false);
        });

        // Mostrar las primeras 10 Series
        dataSeries.results.slice(0, 10).forEach(s => {
            container.innerHTML += crearCard(s, true);
        });

    } catch (error) {
        console.error("Error cargando TMDB:", error);
    }
}

document.addEventListener('DOMContentLoaded', cargarContenido);
</script>

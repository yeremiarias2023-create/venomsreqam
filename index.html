<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFLIX UI PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#141414; color:white; font-family:Arial; }

/* NAV */
.nav { background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }

/* HERO */
.hero {
    height:80vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:end;
    padding:50px;
}

/* ROW */
.row { display:flex; overflow-x:auto; gap:10px; }
.row::-webkit-scrollbar { display:none; }

/* CARD */
.card { min-width:150px; transition:.3s; cursor:pointer; }
.card:hover { transform:scale(1.3); z-index:20; }

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav fixed w-full p-4 flex justify-between z-50">
<h1 class="text-red-600 text-2xl font-bold">NETFLIX</h1>
<input id="search" placeholder="Buscar..." class="bg-black/50 px-3 py-1 rounded">
</div>

<!-- HERO -->
<div id="hero" class="hero"></div>

<main class="px-6 space-y-8">

<div>
<h2 class="text-lg mb-2">Populares</h2>
<div id="popular" class="row"></div>
</div>

<div>
<h2 class="text-lg mb-2">Acción</h2>
<div id="action" class="row"></div>
</div>

<div>
<h2 class="text-lg mb-2">Comedia</h2>
<div id="comedy" class="row"></div>
</div>

</main>

<!-- PLAYER -->
<div id="modal" class="modal">
<div class="w-full h-full">
<iframe id="player" class="w-full h-full" allowfullscreen></iframe>
</div>
<button onclick="closePlayer()" class="absolute top-5 right-5 text-white text-2xl">✖</button>
</div>

<script>
const KEY = "TU_API_KEY_AQUI";
const IMG = "https://image.tmdb.org/t/p/w500";
const BACK = "https://image.tmdb.org/t/p/original";

// 🔁 SERVIDORES (si uno falla usa otro)
const servers = [
    (t,id)=>`https://vidsrc.to/embed/${t}/${id}`,
    (t,id)=>`https://embed.su/embed/${t}/${id}`,
    (t,id)=>`https://multiembed.mov/?video_id=${id}&tmdb=1`
];

// INIT
async function init(){

    const popular = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${KEY}`).then(r=>r.json());
    const action = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=28`).then(r=>r.json());
    const comedy = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=35`).then(r=>r.json());

    renderHero(popular.results[0]);
    renderRow(popular.results,"popular");
    renderRow(action.results,"action");
    renderRow(comedy.results,"comedy");
}

// HERO
function renderHero(movie){
    document.getElementById("hero").style.backgroundImage =
    `linear-gradient(to top,#141414,transparent), url(${BACK+movie.backdrop_path})`;

    document.getElementById("hero").innerHTML = `
    <div>
        <h1 class="text-5xl font-bold">${movie.title}</h1>
        <p class="max-w-lg mt-3">${movie.overview}</p>
        <button onclick="play(${movie.id})" class="mt-4 bg-white text-black px-5 py-2 rounded">▶ Reproducir</button>
    </div>`;
}

// ROW
function renderRow(data,id){
    const row = document.getElementById(id);

    data.forEach(m=>{
        const img = m.poster_path ? IMG+m.poster_path : "https://via.placeholder.com/300x450?text=No+Image";

        row.innerHTML += `
        <img class="card rounded"
        src="${img}"
        onclick="play(${m.id})">`;
    });
}

// PLAYER
function play(id){
    let i=0;
    const iframe = document.getElementById("player");
    const modal = document.getElementById("modal");

    function loadServer(){
        iframe.src = servers[i]("movie",id);
    }

    iframe.onerror = ()=>{
        i++;
        if(i<servers.length) loadServer();
    };

    loadServer();
    modal.style.display="flex";
}

function closePlayer(){
    document.getElementById("modal").style.display="none";
    document.getElementById("player").src="";
}

// BUSCAR
document.getElementById("search").addEventListener("input", async e=>{
    const q = e.target.value;
    if(q.length<3) return init();

    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${q}`);
    const data = await res.json();

    document.getElementById("popular").innerHTML="";
    renderRow(data.results,"popular");
});

init();
</script>

</body>
</html>

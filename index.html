<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venomstream Titan - Multiverso</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .titan-text { color: #00ffcc; font-size: 2.5rem; letter-spacing: 8px; margin-bottom: 10px; text-shadow: 0 0 15px #00ffcc; }
        .bar { width: 200px; height: 4px; background: #333; position: relative; }
        .progress { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; transition: width 0.5s; }
        #app-content { display: none; padding: 20px; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 8px; background: #111; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="titan-text">TITAN OS</div>
        <div class="bar"><div id="progress" class="progress"></div></div>
        <p id="status" style="color: #666; margin-top: 15px;">Sincronizando con satélites...</p>
    </div>

    <div id="app-content">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px;">
            <h1 style="color: red; margin: 0;">VENOMSTREAM <span style="color: #fff; font-size: 0.5em;">VIP ACCESS</span></h1>
            <nav>
                <button onclick="location.reload()" style="background: transparent; color: #fff; border: 1px solid #fff; padding: 5px 15px; cursor: pointer;">RECARGAR SISTEMA</button>
            </nav>
        </header>

        <main>
            <h2 style="margin-top: 30px;">ESTRENOS 2026 - AUDIO LATINO FORZADO</h2>
            <div id="player-container">
                <iframe 
                    id="main-player"
                    src="https://vidsrc.pro/embed/movie/933260?audio_lang=es&native_audio=1" 
                    allowfullscreen 
                    allow="autoplay; encrypted-media">
                </iframe>
            </div>
            <p style="color: #00ffcc; text-align: center;">Nota: Si el audio inicia en inglés, usa el menú ⚙️ del reproductor para cambiar a 'Spanish'.</p>
        </main>
    </div>

    <script>
        // Simulador de carga Titan OS
        let prog = document.getElementById('progress');
        let status = document.getElementById('status');
        let width = 0;

        let interval = setInterval(() => {
            width += Math.random() * 30;
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                }, 1000);
            }
            prog.style.width = width + '%';
            if(width > 50) status.innerText = "Desbloqueando protocolos de audio...";
        }, 400);

        // Función para asegurar el audio latino en la URL
        function loadContent(type, id) {
            const player = document.getElementById('main-player');
            // Agregamos parámetros de idioma que solo funcionan correctamente en servidores web
            player.src = `https://vidsrc.pro/embed/${type}/${id}?audio_lang=es&native_audio=1`;
        }
    </script>
</body>
</html>
